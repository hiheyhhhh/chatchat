<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>CHATCHAT</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --xl-green: #217346;
      --xl-green-dark: #185a37;
      --xl-green-light: #e8f4ec;
      --xl-border: #d0d0d0;
      --xl-border-dark: #a0a0a0;
      --xl-sidebar: #1d6b3a;
      --xl-sidebar-hover: #185a37;
      --xl-sidebar-active: #145230;
      --xl-sidebar-text: #e8f4ec;
      --xl-text: #1a1a1a;
      --xl-text-muted: #595959;
      --xl-input: #ffffff;
      --xl-row-even: #ffffff;
      --xl-row-odd: #f2f2f2;
      --xl-danger: #c0392b;
      --xl-system: #7f7f7f;
    }

    html, body { height: 100%; }
    body { font-family: 'Noto Sans KR', 'Calibri', sans-serif; background: #d0d0d0; display: flex; align-items: center; justify-content: center; font-size: 13px; }

    /* 로그인 */
    #login-screen { background: #fff; border: 1px solid var(--xl-border-dark); box-shadow: 4px 4px 12px rgba(0,0,0,0.25); width: 340px; overflow: hidden; }
    #login-title-bar { background: var(--xl-green); color: #fff; padding: 10px 14px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    #login-body { padding: 28px 24px 24px; }
    #login-body .field-label { font-size: 12px; color: var(--xl-text-muted); margin-bottom: 4px; font-weight: 500; }
    #login-body input { width: 100%; padding: 6px 8px; border: 1px solid var(--xl-border-dark); font-size: 13px; font-family: inherit; outline: none; background: var(--xl-input); margin-bottom: 14px; }
    #login-body input:focus { border-color: var(--xl-green); outline: 2px solid rgba(33,115,70,0.2); }
    #login-btn { background: var(--xl-green); color: #fff; border: 1px solid var(--xl-green-dark); padding: 6px 20px; font-size: 13px; font-family: inherit; cursor: pointer; font-weight: 600; transition: background .15s; }
    #login-btn:hover { background: var(--xl-green-dark); }

    /* 앱 */
    #app { display: none; width: 980px; height: 640px; border: 1px solid var(--xl-border-dark); box-shadow: 4px 4px 16px rgba(0,0,0,0.3); flex-direction: row; background: #fff; position: relative; overflow: hidden; }
    #app.visible { display: flex; }

    /* 리본 */
    #ribbon { position: absolute; top: 0; left: 0; right: 0; height: 36px; background: var(--xl-green); display: flex; align-items: center; padding: 0 12px; z-index: 20; }
    #ribbon .app-name { color: #fff; font-weight: 700; font-size: 13px; letter-spacing: .04em; margin-right: 20px; }
    .ribbon-tab { color: rgba(255,255,255,0.85); font-size: 12px; padding: 0 12px; height: 36px; display: flex; align-items: center; cursor: pointer; transition: background .15s; }
    .ribbon-tab:hover { background: rgba(255,255,255,0.12); }
    .ribbon-tab.active { background: #fff; color: var(--xl-green); font-weight: 600; }
    #ribbon-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    #user-chip { background: rgba(255,255,255,0.18); color: #fff; border-radius: 2px; padding: 3px 10px; font-size: 12px; display: flex; align-items: center; gap: 6px; }
    #user-chip .avatar { width: 18px; height: 18px; background: rgba(255,255,255,0.35); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
    #logout-btn { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 3px 10px; font-size: 11px; font-family: inherit; cursor: pointer; border-radius: 2px; transition: background .15s; }
    #logout-btn:hover { background: rgba(255,255,255,0.28); }
    #menu-btn { display: none; background: none; border: none; color: #fff; font-size: 1.1rem; cursor: pointer; padding: 4px 8px; }

    /* 사이드바 */
    #sidebar { width: 200px; flex-shrink: 0; background: var(--xl-sidebar); display: flex; flex-direction: column; margin-top: 36px; border-right: 2px solid var(--xl-green-dark); position: relative; z-index: 10; transition: transform .25s ease; }
    #sidebar-header { background: var(--xl-sidebar-active); padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-between; }
    #sidebar-header .label { color: var(--xl-sidebar-text); font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
    #sidebar-close { display: none; background: none; border: none; color: rgba(255,255,255,0.6); font-size: 1rem; cursor: pointer; }
    #room-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    #room-list::-webkit-scrollbar { width: 4px; }
    #room-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }
    .room-item { display: flex; align-items: center; gap: 8px; padding: 7px 12px; cursor: pointer; color: var(--xl-sidebar-text); font-size: 12px; border-left: 3px solid transparent; transition: background .1s; position: relative; }
    .room-item:hover { background: var(--xl-sidebar-hover); }
    .room-item.active { background: var(--xl-sidebar-active); border-left-color: #fff; font-weight: 600; }
    .room-item .room-icon { font-size: 0.9rem; flex-shrink: 0; }
    .room-item .room-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .room-item .lock-icon { font-size: 0.65rem; opacity: 0.6; }
    .room-item .room-actions { display: none; gap: 2px; }
    .room-item:hover .room-actions { display: flex; }
    .room-action-btn { background: none; border: none; cursor: pointer; font-size: 0.75rem; padding: 2px 3px; color: rgba(255,255,255,0.5); border-radius: 2px; }
    .room-action-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .room-action-btn.del:hover { background: rgba(192,57,43,0.4); color: #ffaaaa; }
    #add-room-btn { margin: 8px; padding: 6px 10px; background: rgba(255,255,255,0.08); border: 1px dashed rgba(255,255,255,0.25); color: rgba(255,255,255,0.65); font-size: 12px; font-family: inherit; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background .15s; }
    #add-room-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }

    /* 채팅 영역 */
    #chat-area { flex: 1; display: flex; flex-direction: column; margin-top: 36px; background: #fff; min-width: 0; }
    #chat-col-header { background: var(--xl-row-odd); border-bottom: 2px solid var(--xl-border-dark); padding: 0 12px; display: flex; align-items: center; gap: 12px; height: 34px; flex-shrink: 0; border-top: 1px solid var(--xl-border); }
    #chat-col-header .col-room { font-weight: 700; font-size: 12px; color: var(--xl-text); flex: 1; }
    #online-count { font-size: 11px; color: var(--xl-text-muted); background: var(--xl-green-light); border: 1px solid #b8dfca; padding: 2px 8px; border-radius: 2px; white-space: nowrap; }

    /* 메시지 목록 */
    #messages { flex: 1; overflow-y: auto; background: #fff; -webkit-overflow-scrolling: touch; }
    #messages::-webkit-scrollbar { width: 10px; }
    #messages::-webkit-scrollbar-track { background: #f2f2f2; border-left: 1px solid var(--xl-border); }
    #messages::-webkit-scrollbar-thumb { background: #c0c0c0; border: 2px solid #f2f2f2; }

    .msg-row { display: flex; align-items: stretch; border-bottom: 1px solid var(--xl-border); min-height: 28px; }
    .msg-row:nth-child(even) { background: var(--xl-row-odd); }
    .msg-row:nth-child(odd) { background: var(--xl-row-even); }
    .msg-row:hover { background: #e8f4ec; }

    .row-num { width: 36px; min-width: 36px; background: var(--xl-row-odd); border-right: 1px solid var(--xl-border-dark); color: var(--xl-text-muted); font-size: 11px; text-align: center; padding: 6px 4px; display: flex; align-items: center; justify-content: center; }
    .msg-row:hover .row-num { background: #d4edda; color: var(--xl-green); }

    .cell-time { width: 64px; min-width: 64px; border-right: 1px solid var(--xl-border); padding: 6px 8px; font-size: 11px; color: var(--xl-text-muted); display: flex; align-items: center; }
    .cell-sender { width: 80px; min-width: 80px; border-right: 1px solid var(--xl-border); padding: 6px 8px; font-size: 12px; font-weight: 600; display: flex; align-items: center; overflow: hidden; }
    .cell-sender.me { color: var(--xl-green); }
    .cell-sender.other { color: #1a5276; }
    .cell-sender.system-sender { color: var(--xl-system); font-weight: 400; font-style: italic; }
    .cell-msg { flex: 1; padding: 6px 10px; font-size: 13px; color: var(--xl-text); word-break: break-word; line-height: 1.5; display: flex; align-items: center; }
    .cell-msg.me { background: #e8f5e9; color: #276221; }
    .cell-msg.system-msg-cell { color: var(--xl-system); font-style: italic; font-size: 11px; }

    #no-room-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--xl-text-muted); gap: 12px; }
    #no-room-state .xl-logo { font-size: 3rem; }
    #no-room-state p { font-size: 13px; }

    /* 입력 영역 */
    #input-area { border-top: 2px solid var(--xl-border-dark); display: flex; align-items: center; background: var(--xl-row-odd); flex-shrink: 0; }
    #formula-label { background: var(--xl-green); color: #fff; font-size: 12px; font-weight: 700; padding: 0 12px; height: 36px; display: flex; align-items: center; border-right: 1px solid var(--xl-green-dark); white-space: nowrap; flex-shrink: 0; }
    #msg-input { flex: 1; min-width: 0; padding: 7px 10px; border: none; border-right: 1px solid var(--xl-border-dark); font-size: 13px; font-family: inherit; outline: none; background: #fff; height: 36px; }
    #msg-input:focus { background: #f0fff4; }
    #send-btn { background: var(--xl-green); color: #fff; border: none; padding: 0 18px; height: 36px; font-size: 12px; font-weight: 700; font-family: inherit; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: background .15s; }
    #send-btn:hover { background: var(--xl-green-dark); }

    /* 모달 */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 300; align-items: center; justify-content: center; padding: 16px; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: #fff; border: 1px solid var(--xl-border-dark); box-shadow: 4px 4px 16px rgba(0,0,0,0.3); width: 100%; max-width: 320px; overflow: hidden; }
    .modal-title-bar { background: var(--xl-green); color: #fff; padding: 8px 12px; font-size: 13px; font-weight: 700; }
    .modal-body { padding: 20px 16px 16px; }
    .modal-body .field-label { font-size: 11px; color: var(--xl-text-muted); margin-bottom: 3px; font-weight: 500; }
    .modal-body input { width: 100%; padding: 6px 8px; border: 1px solid var(--xl-border-dark); font-size: 13px; font-family: inherit; outline: none; margin-bottom: 10px; }
    .modal-body input:focus { border-color: var(--xl-green); outline: 2px solid rgba(33,115,70,0.2); }
    .modal-hint { font-size: 11px; color: var(--xl-text-muted); margin-bottom: 14px; margin-top: -6px; }
    .modal-desc { font-size: 12px; color: var(--xl-text-muted); margin-bottom: 16px; line-height: 1.6; }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-btns button { padding: 5px 18px; font-size: 12px; font-family: inherit; cursor: pointer; }
    .btn-cancel { background: #f2f2f2; border: 1px solid var(--xl-border-dark); color: var(--xl-text); }
    .btn-cancel:hover { background: #e0e0e0; }
    .btn-confirm { background: var(--xl-green); border: 1px solid var(--xl-green-dark); color: #fff; font-weight: 600; }
    .btn-confirm:hover { background: var(--xl-green-dark); }
    .btn-danger { background: var(--xl-danger); border: 1px solid #922b21; color: #fff; font-weight: 600; }
    .btn-danger:hover { background: #922b21; }

    #pw-modal .pw-icon { font-size: 1.6rem; text-align: center; margin-bottom: 6px; }
    #pw-modal .pw-room { font-weight: 700; text-align: center; margin-bottom: 12px; font-size: 13px; }
    #pw-input { text-align: center; letter-spacing: 3px; }
    #pw-error { font-size: 11px; color: var(--xl-danger); min-height: 16px; margin-bottom: 10px; text-align: center; }

    #sidebar-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.4); z-index: 9; }

    /* 모바일 */
    @media (max-width: 640px) {
      body { align-items: stretch; justify-content: stretch; background: #fff; }
      #login-screen { width: 100%; border: none; box-shadow: none; }
      #login-body { padding: 32px 20px 24px; }
      #app { width: 100%; height: 100vh; height: 100dvh; border: none; box-shadow: none; }
      #sidebar { width: 260px; position: absolute; top: 36px; bottom: 0; left: 0; transform: translateX(-100%); box-shadow: 4px 0 16px rgba(0,0,0,0.3); margin-top: 0; }
      #sidebar.open { transform: translateX(0); }
      #sidebar-overlay.open { display: block; top: 36px; }
      #sidebar-close { display: block; }
      #chat-area { margin-top: 0; }
      #menu-btn { display: block; }
      #formula-label { display: none; }
      #send-btn { padding: 0 14px; }
      .cell-sender { width: 60px; min-width: 60px; font-size: 11px; }
      .cell-time { width: 48px; min-width: 48px; font-size: 10px; }
      .row-num { width: 28px; min-width: 28px; font-size: 10px; }
    }
  </style>
</head>
<body>

<div id="login-screen">
  <div id="login-title-bar">
    <span>📊</span> CHATCHAT — Microsoft Excel
  </div>
  <div id="login-body">
    <div class="field-label">사용자 이름</div>
    <input type="text" id="nickname-input" placeholder="닉네임 입력 (예: 엄마, 밍구)" maxlength="10"/>
    <button id="login-btn">확인</button>
  </div>
</div>

<div id="app">
  <div id="ribbon">
    <span class="app-name">📊 CHATCHAT</span>
    <span class="ribbon-tab active">홈</span>
    <span class="ribbon-tab">보기</span>
    <span class="ribbon-tab">채팅방</span>
    <div id="ribbon-right">
      <div id="user-chip">
        <div class="avatar" id="user-avatar"></div>
        <span id="user-name-display"></span>
      </div>
      <button id="logout-btn">로그아웃</button>
      <button id="menu-btn">☰</button>
    </div>
  </div>

  <div id="sidebar-overlay"></div>

  <div id="sidebar">
    <div id="sidebar-header">
      <span class="label">시트 목록</span>
      <button id="sidebar-close">✕</button>
    </div>
    <div id="room-list"></div>
    <button id="add-room-btn">＋ 새 시트 추가</button>
  </div>

  <div id="chat-area">
    <div id="chat-col-header">
      <span class="col-room" id="current-room-name">시트를 선택하세요</span>
      <div id="online-count" style="display:none"></div>
    </div>
    <div id="messages">
      <div id="no-room-state">
        <div class="xl-logo">📊</div>
        <p>왼쪽에서 시트(채팅방)를 선택하거나 추가하세요</p>
      </div>
    </div>
    <div id="input-area" style="display:none">
      <div id="formula-label">fx</div>
      <input type="text" id="msg-input" placeholder="메시지를 입력하세요..." autocomplete="off"/>
      <button id="send-btn">▶ 전송</button>
    </div>
  </div>
</div>

<!-- 채팅방 만들기 -->
<div id="create-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title-bar">새 시트 만들기</div>
    <div class="modal-body">
      <div class="field-label">시트 이름</div>
      <input type="text" id="modal-room-name" placeholder="예: 가족방" maxlength="20"/>
      <div class="field-label">아이콘 (이모지)</div>
      <input type="text" id="modal-room-emoji" placeholder="예: 🏠" maxlength="2"/>
      <div class="field-label">비밀번호</div>
      <input type="password" id="modal-room-pw" placeholder="없으면 비워두세요"/>
      <p class="modal-hint">🔒 비밀번호를 설정하면 아는 사람만 입장할 수 있어요</p>
      <div class="modal-btns">
        <button class="btn-cancel" id="create-cancel">취소</button>
        <button class="btn-confirm" id="create-confirm">만들기</button>
      </div>
    </div>
  </div>
</div>

<!-- 채팅방 설정 -->
<div id="edit-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title-bar">⚙️ 시트 속성</div>
    <div class="modal-body">
      <div class="field-label">시트 이름</div>
      <input type="text" id="edit-room-name"/>
      <div class="field-label">아이콘</div>
      <input type="text" id="edit-room-emoji" maxlength="2"/>
      <div class="field-label">새 비밀번호</div>
      <input type="password" id="edit-room-pw" placeholder="없애려면 비워두세요"/>
      <p class="modal-hint">🔒 비밀번호를 비워두면 공개방이 돼요</p>
      <div class="modal-btns">
        <button class="btn-cancel" id="edit-cancel">취소</button>
        <button class="btn-confirm" id="edit-confirm">저장</button>
      </div>
    </div>
  </div>
</div>

<!-- 삭제 확인 -->
<div id="del-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title-bar">🗑️ 시트 삭제</div>
    <div class="modal-body">
      <p class="modal-desc" id="del-modal-desc"></p>
      <div class="modal-btns">
        <button class="btn-cancel" id="del-cancel">취소</button>
        <button class="btn-danger" id="del-confirm">삭제</button>
      </div>
    </div>
  </div>
</div>

<!-- 비밀번호 -->
<div id="pw-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title-bar">🔒 시트 보호</div>
    <div class="modal-body">
      <div class="pw-icon">🔒</div>
      <div class="pw-room" id="pw-modal-room-name"></div>
      <div class="field-label">비밀번호</div>
      <input type="password" id="pw-input" placeholder="비밀번호 입력"/>
      <div id="pw-error"></div>
      <div class="modal-btns">
        <button class="btn-cancel" id="pw-cancel">취소</button>
        <button class="btn-confirm" id="pw-confirm">입장</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, set, update, remove, onDisconnect }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDNof2RNfR9wCQw0rtF-8JcEj6K4IsvNc8",
    authDomain: "chatchat-91067.firebaseapp.com",
    databaseURL: "https://chatchat-91067-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "chatchat-91067",
    storageBucket: "chatchat-91067.firebasestorage.app",
    messagingSenderId: "324523501805",
    appId: "1:324523501805:web:d5e094941147cff0ecc4e4"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let currentUser = null, currentRoomId = null, messageListener = null;
  let presenceRef = null, pendingRoom = null, editingRoomId = null, deletingRoomId = null;
  let rowCounter = 1;

  const fmt = ts => ts ? new Date(ts).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }) : '';
  const escHtml = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  async function hashPw(pw) {
    if (!pw) return '';
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  const openModal = id => document.getElementById(id).classList.add('open');
  const closeModal = id => document.getElementById(id).classList.remove('open');
  document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
  });

  const sidebar = document.getElementById('sidebar');
  const sidebarOverlay = document.getElementById('sidebar-overlay');
  function openSidebar() { sidebar.classList.add('open'); sidebarOverlay.classList.add('open'); }
  function closeSidebar() { sidebar.classList.remove('open'); sidebarOverlay.classList.remove('open'); }
  document.getElementById('menu-btn').addEventListener('click', openSidebar);
  document.getElementById('sidebar-close').addEventListener('click', closeSidebar);
  sidebarOverlay.addEventListener('click', closeSidebar);

  document.getElementById('login-btn').addEventListener('click', login);
  document.getElementById('nickname-input').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

  function login() {
    const name = document.getElementById('nickname-input').value.trim();
    if (!name) return;
    currentUser = name;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    document.getElementById('user-name-display').textContent = name;
    document.getElementById('user-avatar').textContent = name.charAt(0).toUpperCase();
    loadRooms();
  }

  document.getElementById('logout-btn').addEventListener('click', () => {
    if (presenceRef) remove(presenceRef);
    currentUser = null; currentRoomId = null; rowCounter = 1;
    document.getElementById('app').classList.remove('visible');
    document.getElementById('login-screen').style.display = '';
    document.getElementById('nickname-input').value = '';
    document.getElementById('room-list').innerHTML = '';
    resetChat();
    closeSidebar();
  });

  function resetChat() {
    document.getElementById('messages').innerHTML = `
      <div id="no-room-state">
        <div class="xl-logo">📊</div>
        <p>왼쪽에서 시트(채팅방)를 선택하거나 추가하세요</p>
      </div>`;
    document.getElementById('input-area').style.display = 'none';
    document.getElementById('current-room-name').textContent = '시트를 선택하세요';
    document.getElementById('online-count').style.display = 'none';
  }

  function loadRooms() {
    onValue(ref(db, 'rooms'), snap => {
      const list = document.getElementById('room-list');
      list.innerHTML = '';
      if (!snap.exists()) return;
      snap.forEach(child => {
        const room = child.val();
        const id = child.key;
        const item = document.createElement('div');
        item.className = 'room-item' + (id === currentRoomId ? ' active' : '');
        item.dataset.id = id;
        item.innerHTML = `
          <span class="room-icon">${room.emoji || '📋'}</span>
          <span class="room-label">${escHtml(room.name)}</span>
          ${room.password ? '<span class="lock-icon">🔒</span>' : ''}
          <span class="room-actions">
            <button class="room-action-btn edit" title="설정">⚙️</button>
            <button class="room-action-btn del" title="삭제">🗑️</button>
          </span>`;
        item.querySelector('.edit').addEventListener('click', e => { e.stopPropagation(); openEditModal(id, room); });
        item.querySelector('.del').addEventListener('click', e => { e.stopPropagation(); openDelModal(id, room); });
        item.addEventListener('click', () => { tryEnterRoom(id, room); closeSidebar(); });
        list.appendChild(item);
      });
    });
  }

  function tryEnterRoom(roomId, room) {
    if (currentRoomId === roomId) return;
    if (room.password) {
      pendingRoom = { roomId, room };
      document.getElementById('pw-modal-room-name').textContent = `${room.emoji || '📋'} ${room.name}`;
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-error').textContent = '';
      openModal('pw-modal');
      setTimeout(() => document.getElementById('pw-input').focus(), 100);
    } else {
      enterRoom(roomId, room);
    }
  }

  document.getElementById('pw-confirm').addEventListener('click', checkPassword);
  document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });
  document.getElementById('pw-cancel').addEventListener('click', () => { closeModal('pw-modal'); pendingRoom = null; });

  async function checkPassword() {
    if (!pendingRoom) return;
    const hashed = await hashPw(document.getElementById('pw-input').value);
    if (hashed === pendingRoom.room.password) {
      closeModal('pw-modal');
      enterRoom(pendingRoom.roomId, pendingRoom.room);
      pendingRoom = null;
    } else {
      document.getElementById('pw-error').textContent = '❌ 비밀번호가 틀렸어요';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
    }
  }

  function enterRoom(roomId, room) {
    if (presenceRef) remove(presenceRef);
    currentRoomId = roomId; rowCounter = 1;
    document.querySelectorAll('.room-item').forEach(el => el.classList.toggle('active', el.dataset.id === roomId));
    document.getElementById('current-room-name').textContent = `${room.emoji || '📋'} ${room.name}`;
    document.getElementById('online-count').style.display = '';
    document.getElementById('input-area').style.display = 'flex';

    presenceRef = ref(db, `presence/${roomId}/${currentUser}`);
    set(presenceRef, true);
    onDisconnect(presenceRef).remove();

    onValue(ref(db, `presence/${roomId}`), snap => {
      const count = snap.exists() ? Object.keys(snap.val()).length : 0;
      document.getElementById('online-count').textContent = `🟢 ${count}명 접속 중`;
    });

    if (messageListener) messageListener();
    const messagesDiv = document.getElementById('messages');
    messagesDiv.innerHTML = '';
    rowCounter = 1;

    messageListener = onValue(ref(db, `messages/${roomId}`), snap => {
      messagesDiv.innerHTML = '';
      rowCounter = 1;
      if (!snap.exists()) {
        messagesDiv.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#595959;font-size:12px;">데이터가 없습니다. 첫 메시지를 입력하세요.</div>`;
        return;
      }
      snap.forEach(child => {
        const msg = child.val();
        const isMe = msg.sender === currentUser;
        const isSystem = msg.type === 'system';
        const row = document.createElement('div');
        row.className = 'msg-row';
        if (isSystem) {
          row.innerHTML = `
            <div class="row-num">${rowCounter++}</div>
            <div class="cell-time">${fmt(msg.ts)}</div>
            <div class="cell-sender system-sender">시스템</div>
            <div class="cell-msg system-msg-cell">${escHtml(msg.text)}</div>`;
        } else {
          row.innerHTML = `
            <div class="row-num">${rowCounter++}</div>
            <div class="cell-time">${fmt(msg.ts)}</div>
            <div class="cell-sender ${isMe ? 'me' : 'other'}">${escHtml(msg.sender)}</div>
            <div class="cell-msg ${isMe ? 'me' : ''}">${escHtml(msg.text)}</div>`;
        }
        messagesDiv.appendChild(row);
      });
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    push(ref(db, `messages/${roomId}`), { type: 'system', text: `${currentUser}님이 입장했습니다`, ts: Date.now() });
  }

  document.getElementById('send-btn').addEventListener('click', sendMsg);
  document.getElementById('msg-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });

  function sendMsg() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !currentRoomId) return;
    push(ref(db, `messages/${currentRoomId}`), { sender: currentUser, text, ts: Date.now() });
    input.value = '';
  }

  document.getElementById('add-room-btn').addEventListener('click', () => {
    ['modal-room-name','modal-room-emoji','modal-room-pw'].forEach(id => document.getElementById(id).value = '');
    openModal('create-modal');
    setTimeout(() => document.getElementById('modal-room-name').focus(), 100);
  });
  document.getElementById('create-cancel').addEventListener('click', () => closeModal('create-modal'));
  document.getElementById('create-confirm').addEventListener('click', createRoom);
  document.getElementById('modal-room-name').addEventListener('keydown', e => { if (e.key === 'Enter') createRoom(); });

  async function createRoom() {
    const name = document.getElementById('modal-room-name').value.trim();
    const emoji = document.getElementById('modal-room-emoji').value.trim() || '📋';
    const pw = document.getElementById('modal-room-pw').value.trim();
    if (!name) return;
    const roomData = { name, emoji, createdBy: currentUser, createdAt: Date.now() };
    if (pw) roomData.password = await hashPw(pw);
    push(ref(db, 'rooms'), roomData);
    closeModal('create-modal');
  }

  function openEditModal(roomId, room) {
    editingRoomId = roomId;
    document.getElementById('edit-room-name').value = room.name;
    document.getElementById('edit-room-emoji').value = room.emoji || '';
    document.getElementById('edit-room-pw').value = '';
    openModal('edit-modal');
    setTimeout(() => document.getElementById('edit-room-name').focus(), 100);
  }
  document.getElementById('edit-cancel').addEventListener('click', () => { closeModal('edit-modal'); editingRoomId = null; });
  document.getElementById('edit-confirm').addEventListener('click', saveRoom);

  async function saveRoom() {
    if (!editingRoomId) return;
    const name = document.getElementById('edit-room-name').value.trim();
    const emoji = document.getElementById('edit-room-emoji').value.trim() || '📋';
    const pw = document.getElementById('edit-room-pw').value.trim();
    if (!name) return;
    const updates = { name, emoji, password: pw ? await hashPw(pw) : '' };
    await update(ref(db, `rooms/${editingRoomId}`), updates);
    closeModal('edit-modal');
    editingRoomId = null;
  }

  function openDelModal(roomId, room) {
    deletingRoomId = roomId;
    document.getElementById('del-modal-desc').textContent = `"${room.name}" 시트를 삭제하면 모든 데이터가 사라져요. 계속할까요?`;
    openModal('del-modal');
  }
  document.getElementById('del-cancel').addEventListener('click', () => { closeModal('del-modal'); deletingRoomId = null; });
  document.getElementById('del-confirm').addEventListener('click', async () => {
    if (!deletingRoomId) return;
    await remove(ref(db, `rooms/${deletingRoomId}`));
    await remove(ref(db, `messages/${deletingRoomId}`));
    await remove(ref(db, `presence/${deletingRoomId}`));
    if (currentRoomId === deletingRoomId) {
      currentRoomId = null;
      if (messageListener) { messageListener(); messageListener = null; }
      resetChat();
    }
    closeModal('del-modal');
    deletingRoomId = null;
  });
</script>
</body>
</html>
