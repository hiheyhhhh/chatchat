<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CHATCHAT</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f4f8; --surface: #ffffff; --sidebar-bg: #1e293b;
      --sidebar-text: #cbd5e1; --accent: #3b82f6; --accent-dark: #2563eb;
      --text: #1e293b; --text-muted: #64748b; --border: #e2e8f0;
      --bubble-me: #3b82f6; --bubble-other: #f1f5f9;
      --bubble-me-text: #ffffff; --bubble-other-text: #1e293b;
      --input-bg: #f8fafc; --danger: #ef4444;
    }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); height: 100vh; display: flex; align-items: center; justify-content: center; }

    #login-screen { background: var(--surface); border-radius: 20px; padding: 48px 40px; width: 360px; box-shadow: 0 8px 40px rgba(0,0,0,0.10); text-align: center; }
    #login-screen .logo { font-size: 2.4rem; margin-bottom: 8px; }
    #login-screen h1 { font-size: 1.4rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    #login-screen p { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 28px; }
    #login-screen input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 0.95rem; font-family: inherit; outline: none; background: var(--input-bg); margin-bottom: 12px; transition: border-color .2s; }
    #login-screen input:focus { border-color: var(--accent); }
    #login-screen button { width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: background .2s; }
    #login-screen button:hover { background: var(--accent-dark); }

    #app { position: relative; display: none; width: 900px; height: 600px; border-radius: 20px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.13); }
    #app.visible { display: block; }

    #sidebar { width: 240px; height: 100%; background: var(--sidebar-bg); display: flex; flex-direction: column; float: left; }
    #sidebar-header { padding: 20px 16px 14px; border-bottom: 1px solid rgba(255,255,255,0.07); }
    #sidebar-header .app-title { color: #fff; font-weight: 700; font-size: 1rem; letter-spacing: .05em; }
    #user-badge { margin-top: 6px; display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.08); border-radius: 20px; padding: 4px 10px 4px 6px; }
    #user-badge .avatar { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #fff; font-weight: 700; }
    #user-badge span { color: #e2e8f0; font-size: 0.8rem; }
    #room-list-header { padding: 14px 16px 6px; color: #94a3b8; font-size: 0.72rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }
    #room-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
    .room-item { display: flex; align-items: center; gap: 8px; padding: 9px 10px; border-radius: 9px; cursor: pointer; color: var(--sidebar-text); font-size: 0.9rem; transition: background .15s; margin-bottom: 2px; position: relative; }
    .room-item:hover { background: rgba(255,255,255,0.07); }
    .room-item.active { background: rgba(59,130,246,0.25); color: #fff; font-weight: 500; }
    .room-item .room-icon { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }
    .room-item .room-label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .room-item .lock-icon { font-size: 0.72rem; opacity: 0.5; flex-shrink: 0; }
    .room-item .room-actions { display: none; gap: 2px; flex-shrink: 0; }
    .room-item:hover .room-actions { display: flex; }
    .room-action-btn { background: none; border: none; cursor: pointer; font-size: 0.8rem; padding: 2px 4px; border-radius: 4px; color: #94a3b8; transition: background .15s, color .15s; }
    .room-action-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .room-action-btn.del:hover { background: rgba(239,68,68,0.2); color: #f87171; }
    #add-room-btn { margin: 8px; padding: 9px 10px; background: rgba(255,255,255,0.05); border: 1.5px dashed rgba(255,255,255,0.15); border-radius: 9px; color: #94a3b8; font-size: 0.85rem; font-family: inherit; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background .15s; }
    #add-room-btn:hover { background: rgba(255,255,255,0.10); color: #e2e8f0; }
    #logout-btn { margin: 8px; padding: 9px 10px; background: none; border: none; color: #64748b; font-size: 0.82rem; font-family: inherit; cursor: pointer; text-align: left; border-radius: 9px; transition: color .15s; }
    #logout-btn:hover { color: var(--danger); background: rgba(239,68,68,0.08); }

    #chat-area { background: var(--surface); display: flex; flex-direction: column; position: absolute; left: 240px; right: 0; top: 0; bottom: 0; }
    #chat-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    #chat-header .room-name { font-weight: 700; font-size: 1rem; color: var(--text); }
    #online-count { margin-left: auto; font-size: 0.78rem; color: var(--text-muted); background: var(--bg); border-radius: 20px; padding: 4px 10px; }
    #messages { flex: 1; overflow-y: auto; padding: 20px 20px 10px; display: flex; flex-direction: column; gap: 8px; }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }
    .msg-group { display: flex; flex-direction: column; gap: 2px; }
    .msg-group.me { align-items: flex-end; }
    .msg-group.other { align-items: flex-start; }
    .msg-sender { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 3px; padding: 0 4px; }
    .bubble { max-width: 65%; padding: 9px 14px; border-radius: 16px; font-size: 0.9rem; line-height: 1.5; word-break: break-word; }
    .msg-group.me .bubble { background: var(--bubble-me); color: var(--bubble-me-text); border-bottom-right-radius: 4px; }
    .msg-group.other .bubble { background: var(--bubble-other); color: var(--bubble-other-text); border-bottom-left-radius: 4px; }
    .msg-time { font-size: 0.68rem; color: var(--text-muted); padding: 0 4px; margin-top: 2px; }
    .system-msg { text-align: center; font-size: 0.75rem; color: var(--text-muted); margin: 4px 0; }
    #no-room-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); gap: 8px; }
    #no-room-state .icon { font-size: 2.5rem; }
    #input-area { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    #msg-input { flex: 1; padding: 10px 16px; border: 1.5px solid var(--border); border-radius: 24px; font-size: 0.92rem; font-family: inherit; outline: none; background: var(--input-bg); transition: border-color .2s; }
    #msg-input:focus { border-color: var(--accent); }
    #send-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; transition: background .2s; flex-shrink: 0; }
    #send-btn:hover { background: var(--accent-dark); }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: #fff; border-radius: 16px; padding: 28px; width: 320px; box-shadow: 0 8px 40px rgba(0,0,0,0.15); }
    .modal-box h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; color: var(--text); }
    .modal-box input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 9px; font-size: 0.92rem; font-family: inherit; outline: none; background: var(--input-bg); margin-bottom: 10px; transition: border-color .2s; }
    .modal-box input:focus { border-color: var(--accent); }
    .modal-hint { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 12px; margin-top: -6px; }
    .modal-btns { display: flex; gap: 8px; margin-top: 4px; }
    .modal-btns button { flex: 1; padding: 10px; border-radius: 9px; border: none; font-size: 0.9rem; font-weight: 600; font-family: inherit; cursor: pointer; }
    .btn-cancel { background: var(--bg); color: var(--text-muted); }
    .btn-confirm { background: var(--accent); color: #fff; }
    .btn-confirm:hover { background: var(--accent-dark); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #dc2626; }

    #pw-modal .lock { font-size: 2rem; margin-bottom: 8px; text-align: center; }
    #pw-modal h2 { text-align: center; }
    #pw-modal p { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 16px; text-align: center; }
    #pw-input { text-align: center; letter-spacing: 2px; }
    #pw-error { font-size: 0.8rem; color: var(--danger); margin-bottom: 10px; min-height: 18px; text-align: center; }
    #del-modal p { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 16px; line-height: 1.6; }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="logo">💬</div>
  <h1>CHATCHAT</h1>
  <p>닉네임을 입력하고 시작하세요</p>
  <input type="text" id="nickname-input" placeholder="닉네임 (예: 엄마, 밍구)" maxlength="10"/>
  <button id="login-btn">입장하기</button>
</div>

<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="app-title">💬 CHATCHAT</div>
      <div id="user-badge">
        <div class="avatar" id="user-avatar"></div>
        <span id="user-name-display"></span>
      </div>
    </div>
    <div id="room-list-header">채팅방</div>
    <div id="room-list"></div>
    <button id="add-room-btn">＋ 새 채팅방 만들기</button>
    <button id="logout-btn">← 로그아웃</button>
  </div>

  <div id="chat-area">
    <div id="chat-header">
      <div class="room-name" id="current-room-name">채팅방을 선택하세요</div>
      <div id="online-count" style="display:none"></div>
    </div>
    <div id="messages">
      <div id="no-room-state">
        <div class="icon">👈</div>
        <p>왼쪽에서 채팅방을 선택하거나 만들어보세요</p>
      </div>
    </div>
    <div id="input-area" style="display:none">
      <input type="text" id="msg-input" placeholder="메시지 입력..."/>
      <button id="send-btn">➤</button>
    </div>
  </div>
</div>

<!-- 채팅방 만들기 모달 -->
<div id="create-modal" class="modal-overlay">
  <div class="modal-box">
    <h2>새 채팅방 만들기</h2>
    <input type="text" id="modal-room-name" placeholder="채팅방 이름 (예: 가족방)" maxlength="20"/>
    <input type="text" id="modal-room-emoji" placeholder="이모지 (예: 🏠)" maxlength="2"/>
    <input type="password" id="modal-room-pw" placeholder="비밀번호 (없으면 비워두세요)"/>
    <p class="modal-hint">🔒 비밀번호를 설정하면 아는 사람만 입장할 수 있어요</p>
    <div class="modal-btns">
      <button class="btn-cancel" id="create-cancel">취소</button>
      <button class="btn-confirm" id="create-confirm">만들기</button>
    </div>
  </div>
</div>

<!-- 채팅방 설정 모달 -->
<div id="edit-modal" class="modal-overlay">
  <div class="modal-box">
    <h2>⚙️ 채팅방 설정</h2>
    <input type="text" id="edit-room-name" placeholder="채팅방 이름"/>
    <input type="text" id="edit-room-emoji" placeholder="이모지" maxlength="2"/>
    <input type="password" id="edit-room-pw" placeholder="새 비밀번호 (없애려면 비워두세요)"/>
    <p class="modal-hint">🔒 비밀번호를 비워두면 공개방이 돼요</p>
    <div class="modal-btns">
      <button class="btn-cancel" id="edit-cancel">취소</button>
      <button class="btn-confirm" id="edit-confirm">저장</button>
    </div>
  </div>
</div>

<!-- 삭제 확인 모달 -->
<div id="del-modal" class="modal-overlay">
  <div class="modal-box">
    <h2>🗑️ 채팅방 삭제</h2>
    <p id="del-modal-desc"></p>
    <div class="modal-btns">
      <button class="btn-cancel" id="del-cancel">취소</button>
      <button class="btn-danger" id="del-confirm">삭제</button>
    </div>
  </div>
</div>

<!-- 비밀번호 입력 모달 -->
<div id="pw-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="lock">🔒</div>
    <h2 id="pw-modal-room-name"></h2>
    <p>비밀번호를 입력해야 입장할 수 있어요</p>
    <input type="password" id="pw-input" placeholder="비밀번호"/>
    <div id="pw-error"></div>
    <div class="modal-btns">
      <button class="btn-cancel" id="pw-cancel">취소</button>
      <button class="btn-confirm" id="pw-confirm">입장</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, set, update, remove, onDisconnect }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDNof2RNfR9wCQw0rtF-8JcEj6K4IsvNc8",
    authDomain: "chatchat-91067.firebaseapp.com",
    databaseURL: "https://chatchat-91067-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "chatchat-91067",
    storageBucket: "chatchat-91067.firebasestorage.app",
    messagingSenderId: "324523501805",
    appId: "1:324523501805:web:d5e094941147cff0ecc4e4"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let currentUser = null;
  let currentRoomId = null;
  let messageListener = null;
  let presenceRef = null;
  let pendingRoom = null;
  let editingRoomId = null;
  let deletingRoomId = null;

  const fmt = ts => ts ? new Date(ts).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }) : '';
  const escHtml = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  async function hashPw(pw) {
    if (!pw) return '';
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  const openModal = id => document.getElementById(id).classList.add('open');
  const closeModal = id => document.getElementById(id).classList.remove('open');
  document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
  });

  // 로그인
  document.getElementById('login-btn').addEventListener('click', login);
  document.getElementById('nickname-input').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

  function login() {
    const name = document.getElementById('nickname-input').value.trim();
    if (!name) return;
    currentUser = name;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    document.getElementById('user-name-display').textContent = name;
    document.getElementById('user-avatar').textContent = name.charAt(0).toUpperCase();
    loadRooms();
  }

  document.getElementById('logout-btn').addEventListener('click', () => {
    if (presenceRef) remove(presenceRef);
    currentUser = null; currentRoomId = null;
    document.getElementById('app').classList.remove('visible');
    document.getElementById('login-screen').style.display = '';
    document.getElementById('nickname-input').value = '';
    document.getElementById('room-list').innerHTML = '';
    document.getElementById('messages').innerHTML = `<div id="no-room-state"><div class="icon">👈</div><p>왼쪽에서 채팅방을 선택하거나 만들어보세요</p></div>`;
    document.getElementById('input-area').style.display = 'none';
    document.getElementById('current-room-name').textContent = '채팅방을 선택하세요';
    document.getElementById('online-count').style.display = 'none';
  });

  // 채팅방 목록
  function loadRooms() {
    onValue(ref(db, 'rooms'), snap => {
      const list = document.getElementById('room-list');
      list.innerHTML = '';
      if (!snap.exists()) return;
      snap.forEach(child => {
        const room = child.val();
        const id = child.key;
        const item = document.createElement('div');
        item.className = 'room-item' + (id === currentRoomId ? ' active' : '');
        item.dataset.id = id;
        item.innerHTML = `
          <span class="room-icon">${room.emoji || '💬'}</span>
          <span class="room-label">${escHtml(room.name)}</span>
          ${room.password ? '<span class="lock-icon">🔒</span>' : ''}
          <span class="room-actions">
            <button class="room-action-btn edit" title="설정">⚙️</button>
            <button class="room-action-btn del" title="삭제">🗑️</button>
          </span>`;
        item.querySelector('.edit').addEventListener('click', e => { e.stopPropagation(); openEditModal(id, room); });
        item.querySelector('.del').addEventListener('click', e => { e.stopPropagation(); openDelModal(id, room); });
        item.addEventListener('click', () => tryEnterRoom(id, room));
        list.appendChild(item);
      });
    });
  }

  // 채팅방 입장
  function tryEnterRoom(roomId, room) {
    if (currentRoomId === roomId) return;
    if (room.password) {
      pendingRoom = { roomId, room };
      document.getElementById('pw-modal-room-name').textContent = `${room.emoji || '💬'} ${room.name}`;
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-error').textContent = '';
      openModal('pw-modal');
      setTimeout(() => document.getElementById('pw-input').focus(), 100);
    } else {
      enterRoom(roomId, room);
    }
  }

  document.getElementById('pw-confirm').addEventListener('click', checkPassword);
  document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });
  document.getElementById('pw-cancel').addEventListener('click', () => { closeModal('pw-modal'); pendingRoom = null; });

  async function checkPassword() {
    if (!pendingRoom) return;
    const hashed = await hashPw(document.getElementById('pw-input').value);
    if (hashed === pendingRoom.room.password) {
      closeModal('pw-modal');
      enterRoom(pendingRoom.roomId, pendingRoom.room);
      pendingRoom = null;
    } else {
      document.getElementById('pw-error').textContent = '❌ 비밀번호가 틀렸어요';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
    }
  }

  function enterRoom(roomId, room) {
    if (presenceRef) remove(presenceRef);
    currentRoomId = roomId;
    document.querySelectorAll('.room-item').forEach(el => el.classList.toggle('active', el.dataset.id === roomId));
    document.getElementById('current-room-name').textContent = `${room.emoji || '💬'} ${room.name}`;
    document.getElementById('online-count').style.display = '';
    document.getElementById('input-area').style.display = 'flex';

    presenceRef = ref(db, `presence/${roomId}/${currentUser}`);
    set(presenceRef, true);
    onDisconnect(presenceRef).remove();

    onValue(ref(db, `presence/${roomId}`), snap => {
      const count = snap.exists() ? Object.keys(snap.val()).length : 0;
      document.getElementById('online-count').textContent = `🟢 ${count}명 접속 중`;
    });

    if (messageListener) messageListener();
    const messagesDiv = document.getElementById('messages');
    messagesDiv.innerHTML = '';

    messageListener = onValue(ref(db, `messages/${roomId}`), snap => {
      messagesDiv.innerHTML = '';
      if (!snap.exists()) {
        messagesDiv.innerHTML = `<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-muted);">첫 메시지를 보내보세요! 💬</div>`;
        return;
      }
      let prevSender = null;
      snap.forEach(child => {
        const msg = child.val();
        const isMe = msg.sender === currentUser;
        if (msg.type === 'system') {
          const el = document.createElement('div');
          el.className = 'system-msg';
          el.textContent = msg.text;
          messagesDiv.appendChild(el);
          prevSender = null;
          return;
        }
        const showSender = !isMe && msg.sender !== prevSender;
        const group = document.createElement('div');
        group.className = `msg-group ${isMe ? 'me' : 'other'}`;
        group.innerHTML = `
          ${showSender ? `<div class="msg-sender">${escHtml(msg.sender)}</div>` : ''}
          <div class="bubble">${escHtml(msg.text)}</div>
          <div class="msg-time">${fmt(msg.ts)}</div>`;
        messagesDiv.appendChild(group);
        prevSender = msg.sender;
      });
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    push(ref(db, `messages/${roomId}`), { type: 'system', text: `${currentUser}님이 입장했습니다`, ts: Date.now() });
  }

  // 메시지 전송
  document.getElementById('send-btn').addEventListener('click', sendMsg);
  document.getElementById('msg-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });

  function sendMsg() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !currentRoomId) return;
    push(ref(db, `messages/${currentRoomId}`), { sender: currentUser, text, ts: Date.now() });
    input.value = '';
  }

  // 채팅방 만들기
  document.getElementById('add-room-btn').addEventListener('click', () => {
    document.getElementById('modal-room-name').value = '';
    document.getElementById('modal-room-emoji').value = '';
    document.getElementById('modal-room-pw').value = '';
    openModal('create-modal');
    setTimeout(() => document.getElementById('modal-room-name').focus(), 100);
  });
  document.getElementById('create-cancel').addEventListener('click', () => closeModal('create-modal'));
  document.getElementById('create-confirm').addEventListener('click', createRoom);
  document.getElementById('modal-room-name').addEventListener('keydown', e => { if (e.key === 'Enter') createRoom(); });

  async function createRoom() {
    const name = document.getElementById('modal-room-name').value.trim();
    const emoji = document.getElementById('modal-room-emoji').value.trim() || '💬';
    const pw = document.getElementById('modal-room-pw').value.trim();
    if (!name) return;
    const roomData = { name, emoji, createdBy: currentUser, createdAt: Date.now() };
    if (pw) roomData.password = await hashPw(pw);
    push(ref(db, 'rooms'), roomData);
    closeModal('create-modal');
  }

  // 채팅방 수정
  function openEditModal(roomId, room) {
    editingRoomId = roomId;
    document.getElementById('edit-room-name').value = room.name;
    document.getElementById('edit-room-emoji').value = room.emoji || '';
    document.getElementById('edit-room-pw').value = '';
    openModal('edit-modal');
    setTimeout(() => document.getElementById('edit-room-name').focus(), 100);
  }
  document.getElementById('edit-cancel').addEventListener('click', () => { closeModal('edit-modal'); editingRoomId = null; });
  document.getElementById('edit-confirm').addEventListener('click', saveRoom);

  async function saveRoom() {
    if (!editingRoomId) return;
    const name = document.getElementById('edit-room-name').value.trim();
    const emoji = document.getElementById('edit-room-emoji').value.trim() || '💬';
    const pw = document.getElementById('edit-room-pw').value.trim();
    if (!name) return;
    const updates = { name, emoji };
    updates.password = pw ? await hashPw(pw) : '';
    await update(ref(db, `rooms/${editingRoomId}`), updates);
    closeModal('edit-modal');
    editingRoomId = null;
  }

  // 채팅방 삭제
  function openDelModal(roomId, room) {
    deletingRoomId = roomId;
    document.getElementById('del-modal-desc').textContent = `"${room.name}" 채팅방을 삭제하면 모든 메시지가 사라져요. 정말 삭제할까요?`;
    openModal('del-modal');
  }
  document.getElementById('del-cancel').addEventListener('click', () => { closeModal('del-modal'); deletingRoomId = null; });
  document.getElementById('del-confirm').addEventListener('click', async () => {
    if (!deletingRoomId) return;
    await remove(ref(db, `rooms/${deletingRoomId}`));
    await remove(ref(db, `messages/${deletingRoomId}`));
    await remove(ref(db, `presence/${deletingRoomId}`));
    if (currentRoomId === deletingRoomId) {
      currentRoomId = null;
      if (messageListener) { messageListener(); messageListener = null; }
      document.getElementById('messages').innerHTML = `<div id="no-room-state"><div class="icon">👈</div><p>왼쪽에서 채팅방을 선택하거나 만들어보세요</p></div>`;
      document.getElementById('input-area').style.display = 'none';
      document.getElementById('current-room-name').textContent = '채팅방을 선택하세요';
      document.getElementById('online-count').style.display = 'none';
    }
    closeModal('del-modal');
    deletingRoomId = null;
  });
</script>
</body>
</html>
